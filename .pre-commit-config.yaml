# pre-commit hooks 复用项目级的 ruff / mypy，与 CI 用同一份钉死版本，避免漂移。
# 一次性安装: uv run pre-commit install
# 手动跑全量: uv run pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        language: system
        entry: uv run ruff check --force-exclude
        types_or: [python, pyi]
        require_serial: true

      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format --check --force-exclude
        types_or: [python, pyi]
        require_serial: true

      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy
        types: [python]
        pass_filenames: false
        require_serial: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
